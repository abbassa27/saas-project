<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;cursor:none;}
.cursor{width:20px;height:20px;border:2px solid gold;border-radius:50%;position:fixed;pointer-events:none;transform:translate(-50%,-50%);}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;perspective:1000px;}
.glow{font-size:60px;background:linear-gradient(90deg,#FFD700,#fff);-webkit-background-clip:text;color:transparent;}
.btn{padding:18px 40px;background:#FFD700;color:#000;border:none;border-radius:12px;transition:0.3s;}
.btn:hover{transform:scale(1.1);}
.parallax{transform:translateZ(50px);}
.card{background:#111;padding:30px;margin:20px;border-radius:20px;transition:0.3s;}
.card:hover{transform:rotateY(10deg) scale(1.05);}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div id="root"></div>

<script>
document.addEventListener("mousemove",(e)=>{
 const c=document.getElementById("cursor");
 c.style.left=e.clientX+"px";
 c.style.top=e.clientY+"px";
});
</script>

</body>
</html>
